# deny.toml
#
# Configuration for `cargo deny check`. Enforces license compliance and
# flags duplicate/banned dependencies. See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  # "RUSTSEC-2024-0001",  # mirror any audit.toml suppressions here too,
                            # with the same justification/owner/review-by.
]

[licenses]
version = 2
# Allow common permissive licenses used across the Rust/Soroban ecosystem.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
  # Add explicitly banned crates here, e.g.:
  # { name = "openssl", reason = "use rustls instead" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]